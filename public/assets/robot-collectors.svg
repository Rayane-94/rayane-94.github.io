<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c0056"/>
      <stop offset="100%" stop-color="#7611a6"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c561f6" stroke-opacity="0.15" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <rect width="1000" height="600" fill="url(#grid)"/>

  <!-- map cells -->
  <g opacity="0.5">
    <rect x="120" y="120" width="30" height="30" fill="#c561f6" opacity="0.3"/>
    <rect x="700" y="160" width="30" height="30" fill="#c561f6" opacity="0.3"/>
    <rect x="820" y="420" width="30" height="30" fill="#c561f6" opacity="0.3"/>
    <rect x="200" y="440" width="30" height="30" fill="#c561f6" opacity="0.3"/>
  </g>

  <!-- scout robot -->
  <g transform="translate(340,260)">
    <rect x="-22" y="-22" width="44" height="44" rx="8" fill="#e3e6ee"/>
    <circle cx="-8" cy="-4" r="5" fill="#1c0056"/>
    <circle cx="8" cy="-4" r="5" fill="#1c0056"/>
    <rect x="-14" y="10" width="28" height="5" rx="2" fill="#1c0056"/>
    <line x1="0" y1="-22" x2="0" y2="-36" stroke="#e3e6ee" stroke-width="3"/>
    <circle cx="0" cy="-40" r="5" fill="#c561f6"/>
  </g>

  <!-- collector robot -->
  <g transform="translate(560,340)">
    <rect x="-26" y="-20" width="52" height="40" rx="10" fill="#e3e6ee"/>
    <circle cx="-10" cy="-2" r="5" fill="#1c0056"/>
    <circle cx="10" cy="-2" r="5" fill="#1c0056"/>
    <rect x="-30" y="14" width="60" height="10" rx="4" fill="#c561f6"/>
  </g>

  <!-- connection line -->
  <line x1="340" y1="260" x2="560" y2="340" stroke="#c561f6" stroke-width="2" stroke-dasharray="6 6"/>

  <text x="500" y="90" font-family="monospace" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle">ROBOT COLLECTORS</text>
  <text x="500" y="130" font-family="monospace" font-size="20" fill="#e3e6ee" text-anchor="middle" opacity="0.85">Rust · simulation multi-agents concurrente</text>

  <g transform="translate(500,520)" font-family="monospace" font-size="16" fill="#c561f6">
    <text x="-260" y="0">&gt; scouts exploring...</text>
    <text x="20" y="0">&gt; collector BFS route found</text>
  </g>
</svg>
