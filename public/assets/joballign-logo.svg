<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c0056"/>
      <stop offset="100%" stop-color="#7611a6"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="url(#bg2)"/>

  <!-- CV document -->
  <g transform="translate(330,300)">
    <rect x="-110" y="-160" width="220" height="320" rx="14" fill="#f5f3fb"/>
    <circle cx="-40" cy="-100" r="26" fill="#c561f6"/>
    <rect x="0" y="-112" width="90" height="10" rx="4" fill="#7611a6"/>
    <rect x="0" y="-90" width="70" height="8" rx="4" fill="#c561f6" opacity="0.6"/>
    <rect x="-80" y="-40" width="160" height="8" rx="4" fill="#1c0056" opacity="0.7"/>
    <rect x="-80" y="-16" width="160" height="8" rx="4" fill="#1c0056" opacity="0.5"/>
    <rect x="-80" y="8" width="120" height="8" rx="4" fill="#1c0056" opacity="0.5"/>
    <rect x="-80" y="40" width="160" height="8" rx="4" fill="#1c0056" opacity="0.35"/>
    <rect x="-80" y="64" width="100" height="8" rx="4" fill="#1c0056" opacity="0.35"/>
    <rect x="-80" y="96" width="160" height="8" rx="4" fill="#1c0056" opacity="0.25"/>
  </g>

  <!-- match arrows -->
  <g stroke="#c561f6" stroke-width="3" fill="none">
    <path d="M470 250 C 530 220, 570 220, 630 250" marker-end="url(#arrow)"/>
    <path d="M630 350 C 570 380, 530 380, 470 350" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c561f6"/>
    </marker>
  </defs>

  <!-- job offer document -->
  <g transform="translate(700,300)">
    <rect x="-100" y="-140" width="200" height="280" rx="14" fill="#f5f3fb"/>
    <rect x="-70" y="-100" width="140" height="14" rx="4" fill="#7611a6"/>
    <rect x="-70" y="-70" width="140" height="8" rx="4" fill="#1c0056" opacity="0.6"/>
    <rect x="-70" y="-46" width="100" height="8" rx="4" fill="#1c0056" opacity="0.6"/>
    <rect x="-70" y="-10" width="140" height="8" rx="4" fill="#1c0056" opacity="0.35"/>
    <rect x="-70" y="14" width="140" height="8" rx="4" fill="#1c0056" opacity="0.35"/>
    <rect x="-70" y="38" width="90" height="8" rx="4" fill="#1c0056" opacity="0.35"/>
    <rect x="-70" y="80" width="140" height="30" rx="8" fill="#c561f6"/>
    <text x="0" y="100" font-family="monospace" font-size="13" fill="#1c0056" text-anchor="middle">92% match</text>
  </g>

  <text x="500" y="90" font-family="monospace" font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle">JobAlign</text>
  <text x="500" y="130" font-family="monospace" font-size="20" fill="#e3e6ee" text-anchor="middle" opacity="0.85">CV ↔ Offre · matching par IA locale</text>
</svg>
