<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c0056"/>
      <stop offset="100%" stop-color="#7611a6"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="url(#bg3)"/>

  <!-- phone -->
  <g transform="translate(360,300)">
    <rect x="-100" y="-190" width="200" height="380" rx="28" fill="#f5f3fb"/>
    <rect x="-84" y="-166" width="168" height="300" rx="6" fill="#1c0056"/>
    <!-- prescription on screen -->
    <rect x="-64" y="-140" width="128" height="170" rx="6" fill="#f5f3fb"/>
    <rect x="-48" y="-118" width="96" height="8" rx="3" fill="#7611a6" opacity="0.8"/>
    <rect x="-48" y="-96" width="70" height="6" rx="3" fill="#1c0056" opacity="0.5"/>
    <rect x="-48" y="-80" width="90" height="6" rx="3" fill="#1c0056" opacity="0.5"/>
    <rect x="-48" y="-64" width="60" height="6" rx="3" fill="#1c0056" opacity="0.5"/>
    <!-- scan corners -->
    <path d="M-64 -140 l0 -14 l14 0 M64 -140 l0 -14 l-14 0 M-64 30 l0 14 l14 0 M64 30 l0 14 l-14 0" fill="none" stroke="#c561f6" stroke-width="4"/>
    <circle cx="0" cy="148" r="14" fill="#c561f6"/>
  </g>

  <!-- pill / medication icon -->
  <g transform="translate(660,260) rotate(-25)">
    <rect x="-50" y="-18" width="100" height="36" rx="18" fill="#c561f6"/>
    <rect x="-50" y="-18" width="50" height="36" rx="18" fill="#e3e6ee"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#1c0056" stroke-width="2"/>
  </g>

  <!-- bell / reminder -->
  <g transform="translate(700,380)">
    <path d="M0,-30 a30,30 0 0 1 30,30 v20 l10,14 h-80 l10,-14 v-20 a30,30 0 0 1 30,-30 z" fill="#e3e6ee"/>
    <circle cx="0" cy="40" r="8" fill="#e3e6ee"/>
  </g>

  <text x="500" y="90" font-family="monospace" font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle">Scan Care</text>
  <text x="500" y="130" font-family="monospace" font-size="20" fill="#e3e6ee" text-anchor="middle" opacity="0.85">OCR + IA · rappel de prise de médicaments</text>
</svg>
